[package]
name = "lib-of-babel"
version = "0.1.0"
edition = "2021"
authors = ["AHurowitz <latkaindustries@gmail.com>"]
description = "A living, walkable Library of Babel: deterministic Rust->WASM gallery generator with cryptographic per-gallery fingerprints."
license = "MIT"
repository = "https://github.com/Latka-Industries/lib-of-babel"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
# pure-Rust, no_std-friendly cryptographic hash for collision-resistant
# gallery fingerprints (works on wasm32 without SIMD intrinsics).
blake3 = { version = "1", default-features = false }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
