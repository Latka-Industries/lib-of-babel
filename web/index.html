<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lib-of-babel</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0b0d;
        --panel: #141318;
        --ink: #d8d4c8;
        --muted: #6f6a5e;
        --accent: #c9a227;
        --line: #2a2832;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        position: sticky; top: 0; z-index: 5;
        display: flex; flex-wrap: wrap; gap: 0.75rem 1.5rem; align-items: baseline;
        padding: 0.75rem 1rem;
        background: rgba(11,11,13,0.92);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(6px);
      }
      header h1 { font-size: 1rem; letter-spacing: 0.18em; margin: 0; font-weight: 600; }
      .stat { color: var(--muted); }
      .stat b { color: var(--ink); font-weight: 600; }
      .hash { color: var(--accent); }
      .spacer { flex: 1; }
      button {
        font: inherit; color: var(--ink); background: var(--panel);
        border: 1px solid var(--line); border-radius: 6px;
        padding: 0.35rem 0.7rem; cursor: pointer;
      }
      button:hover { border-color: var(--accent); }
      .moves { display: flex; gap: 0.35rem; }
      .moves button { min-width: 2.4rem; }
      main { padding: 1rem; max-width: 1100px; margin: 0 auto; }
      .walls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .wall {
        background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
        padding: 0.75rem;
      }
      .wall h2 { font-size: 0.75rem; color: var(--muted); margin: 0 0 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; }
      .shelf {
        display: flex; gap: 3px; padding: 4px 0; border-bottom: 1px solid var(--line);
        overflow-x: auto;
      }
      .shelf:last-child { border-bottom: none; }
      .book {
        flex: 0 0 auto; width: 17px; height: 52px;
        border-radius: 2px; cursor: pointer;
        border: 1px solid rgba(0, 0, 0, 0.55);
        background: linear-gradient(180deg, #3a3550, #211f2c);
        display: flex; align-items: center; justify-content: center;
        writing-mode: vertical-rl; text-orientation: mixed;
        font-size: 8px; line-height: 1; letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.82); text-shadow: 0 1px 1px rgba(0,0,0,0.6);
        overflow: hidden; padding: 3px 0; transition: transform 0.06s;
      }
      .book:hover { outline: 1px solid #fff; transform: translateY(-3px); z-index: 2; }
      .breadcrumb { margin-top: 1rem; color: var(--muted); font-size: 12px; word-break: break-all; }
      .breadcrumb b { color: var(--ink); }
      dialog {
        background: var(--panel); color: var(--ink);
        border: 1px solid var(--line); border-radius: 10px;
        max-width: 760px; width: 92vw; padding: 0;
      }
      dialog::backdrop { background: rgba(0,0,0,0.6); }
      .book-head { padding: 0.9rem 1rem; border-bottom: 1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:1rem;}
      .book-head h3 { margin: 0; font-size: 0.95rem; }
      .book-head small { color: var(--muted); }
      pre.page {
        margin: 0; padding: 1rem; white-space: pre-wrap; word-break: break-word;
        max-height: 56vh; overflow: auto; color: #b9b3a4; font-size: 13px;
      }
      .book-nav {
        display: flex; align-items: center; gap: 0.6rem;
        padding: 0.6rem 1rem; border-top: 1px solid var(--line);
      }
      .book-nav #pageInd { color: var(--muted); min-width: 9rem; }
      .book-nav input {
        width: 4.5rem; font: inherit; color: var(--ink);
        background: var(--bg); border: 1px solid var(--line);
        border-radius: 5px; padding: 0.25rem 0.4rem;
      }
      .book-nav .grow { flex: 1; }
      .loading { color: var(--muted); padding: 2rem; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <h1>LIB&middot;OF&middot;BABEL</h1>
      <span class="stat">gallery <b id="coord">…</b></span>
      <span class="stat">hash <b class="hash" id="hash">…</b></span>
      <span class="stat">steps <b id="steps">0</b></span>
      <span class="spacer"></span>
      <div class="moves">
        <button data-move="0" title="left hallway (←)">◁</button>
        <button data-move="2" title="stairs up (↑)">▲</button>
        <button data-move="3" title="stairs down (↓)">▼</button>
        <button data-move="1" title="right hallway (→)">▷</button>
      </div>
      <button id="export" title="download journey JSON">export</button>
      <button id="reset" title="forget trail, start somewhere new">new walk</button>
    </header>
    <main>
      <div id="walls" class="walls"><div class="loading">summoning the wasm…</div></div>
      <div id="breadcrumb" class="breadcrumb"></div>
    </main>

    <dialog id="bookModal">
      <div class="book-head">
        <div>
          <h3 id="bookTitle">—</h3>
          <small id="bookMeta"></small>
        </div>
        <button id="closeBook">close</button>
      </div>
      <pre class="page" id="bookPage"></pre>
      <div class="book-nav">
        <button id="prevPage">‹ prev</button>
        <button id="nextPage">next ›</button>
        <span id="pageInd">page 1 / 410</span>
        <span class="grow"></span>
        <input id="pageJump" type="number" min="1" max="410" placeholder="page" />
        <button id="goPage">go</button>
      </div>
    </dialog>

    <script type="module" src="./main.js"></script>
  </body>
</html>
