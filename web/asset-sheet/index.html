<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lib-of-babel · asset sheet</title>
    <script>
      (function () {
        try {
          var k = "lib-of-babel-theme";
          var t = localStorage.getItem(k);
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="../css/app.css" />
    <link rel="stylesheet" href="./sheet.css" />
  </head>
  <body>
    <div class="sheet-top">
      <h1>ASSET SHEET</h1>
      <span class="find-dim">lib-of-babel · real CSS · no WASM</span>
      <nav class="sheet-nav-dd dd" id="sheetNavDd" aria-label="sections">
        <button type="button" class="dd-trigger" aria-expanded="false" aria-haspopup="menu"
          aria-controls="sheetNavMenu" aria-labelledby="sheetNavLabel">
          <span class="dd-label" id="sheetNavLabel">sections…</span>
          <span class="dd-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </span>
        </button>
        <div class="dd-menu" id="sheetNavMenu" role="menu" hidden>
          <button type="button" role="menuitem" class="dd-item" data-action="tokens">tokens</button>
          <button type="button" role="menuitem" class="dd-item" data-action="type">type</button>
          <button type="button" role="menuitem" class="dd-item" data-action="controls">controls</button>
          <button type="button" role="menuitem" class="dd-item" data-action="chrome">chrome</button>
          <button type="button" role="menuitem" class="dd-item" data-action="stage">stage</button>
          <button type="button" role="menuitem" class="dd-item" data-action="find">find</button>
          <button type="button" role="menuitem" class="dd-item" data-action="searchBands">search</button>
          <button type="button" role="menuitem" class="dd-item" data-action="compare">compare</button>
          <button type="button" role="menuitem" class="dd-item" data-action="dialogs">dialogs</button>
          <button type="button" role="menuitem" class="dd-item" data-action="reader">reader</button>
          <button type="button" role="menuitem" class="dd-item" data-action="history">history</button>
          <button type="button" role="menuitem" class="dd-item" data-action="mbit">mbit copy</button>
        </div>
      </nav>
      <button type="button" id="themeToggle" class="theme-toggle" aria-pressed="false" title="toggle theme">☀</button>
    </div>

    <main class="sheet-main" id="sheetMain">
      <p class="sheet-lead find-dim">
        Continuous inventory of static chrome and dynamic copy samples.
        Dev-only (<code>mise run serve</code> / <code>mise run dev</code>; stripped from Pages).
        Toggle theme anytime — same <code>data-theme</code> / localStorage key as the app.
      </p>

      <div data-section="tokens"></div>
      <div data-section="type"></div>
      <div data-section="controls"></div>
      <div data-section="chrome"></div>
      <div data-section="stage"></div>
      <div data-section="find"></div>
      <div data-section="compare"></div>
      <div data-section="dialogs"></div>
      <div data-section="mbit"></div>
    </main>

    <script type="module" src="./js/boot.js"></script>
  </body>
</html>
