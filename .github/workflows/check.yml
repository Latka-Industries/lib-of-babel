# Equivalent of `mise run check` — without mise.
name: Check

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test · js helpers · alphabet packs · basile scramble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: JS helper checks
        run: |
          node scripts/test-png-babel.mjs
          node scripts/test-fold-page-scope.mjs

      - name: alphabet pack drift
        run: sh scripts/check-alphabet-packs.sh

      - name: baked Basile scramble warm
        run: cargo run --bin gen_basile_scramble -- --verify-warm
